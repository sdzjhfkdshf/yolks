name: build-yolk
on:
  push:
    branches:
      - main
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./games/sourcecsgo
          file: ./games/sourcecsgo/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:sourcecsgo